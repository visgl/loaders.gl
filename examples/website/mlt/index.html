<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@loaders.gl/mlt — 3D Globe</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: sans-serif; background: #0a0a1a; }
      #map { width: 100vw; height: 100vh; }

      #info {
        position: absolute;
        top: 12px;
        left: 12px;
        background: rgba(0,0,0,0.65);
        backdrop-filter: blur(6px);
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 12px;
        max-width: 260px;
        line-height: 1.7;
        z-index: 10;
        color: #ddd;
        border: 1px solid rgba(255,255,255,0.08);
      }
      #info h3 { font-size: 13px; color: #7dd3fc; margin-bottom: 8px; letter-spacing: 0.5px; }
      #status { color: #86efac; margin-top: 8px; font-size: 11px; min-height: 1em; }

      .legend { display: flex; flex-direction: column; gap: 3px; }
      .legend-item { display: flex; align-items: center; gap: 7px; font-size: 11px; }
      .swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div id="info">
      <h3>@loaders.gl/mlt · 3D Globe</h3>
      Countries extruded at 400 km via <code>fill-extrusion</code>.<br>
      Tiles from <a href="https://github.com/maplibre/demotiles" target="_blank" style="color:#7dd3fc">maplibre/demotiles</a>.
      <div class="legend">
        <div class="legend-item"><div class="swatch" style="background:#e07b54"></div>Africa</div>
        <div class="legend-item"><div class="swatch" style="background:#e8c56d"></div>Asia</div>
        <div class="legend-item"><div class="swatch" style="background:#7dbf8e"></div>Europe</div>
        <div class="legend-item"><div class="swatch" style="background:#6baed6"></div>North America</div>
        <div class="legend-item"><div class="swatch" style="background:#e8915a"></div>South America</div>
        <div class="legend-item"><div class="swatch" style="background:#9e88c4"></div>Oceania</div>
        <div class="legend-item"><div class="swatch" style="background:#c8e6fa"></div>Antarctica</div>
      </div>
      <div id="status">Loading…</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
