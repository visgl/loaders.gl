name: test

# On every pull request, but only on push to master
on:
  push:
    branches:
    - master
  pull_request:

jobs:
  test:
    name: Tests (Node ${{ matrix.node-version }} - ${{ matrix.scope }})
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - node-version: 24
            coverage: true
            coverage-artifact: coverage-node
            playwright: false
            scope: 'node tests'
            test-command: test-node-cover
          - node-version: 24
            coverage: true
            coverage-artifact: coverage-headless
            playwright: true
            scope: 'headless tests'
            test-command: test-headless-cover
          - node-version: 22
            coverage: false
            coverage-artifact: ''
            playwright: false
            scope: 'node tests'
            test-command: test-node
          - node-version: 20
            coverage: false
            coverage-artifact: ''
            playwright: false
            scope: 'node tests'
            test-command: test-node

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node (with Corepack)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Enable Corepack / Yarn 4
        run: |
          corepack enable
          corepack prepare yarn@4.10.3 --activate
          yarn -v

      - name: Cache Yarn 4 artifacts
        id: yarn-cache
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .pnp.*
            .yarn/install-state.gz
          key: yarn-cache-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            yarn-cache-${{ runner.os }}-

      - name: Print versions
        run: |
          node -v
          yarn -v
          node -p "process.versions"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        if: matrix.playwright
        run: yarn playwright install --with-deps chromium

      - name: Build workers
        run: yarn run build-workers

      - name: Run tests
        run: |
          yarn run ${{ matrix.test-command }}

      - name: Sanitize lcov for Coveralls
        if: matrix.coverage
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const coveragePath = 'coverage/lcov.info';
          const lines = fs.readFileSync(coveragePath, 'utf8').split(/\r?\n/);
          const records = [];
          let currentRecord = [];

          for (const line of lines) {
            currentRecord.push(line);
            if (line === 'end_of_record') {
              const sourceFileLine = currentRecord.find(recordLine => recordLine.startsWith('SF:'));
              const sourceFile = sourceFileLine ? sourceFileLine.slice(3).trim() : '';
              if (sourceFile) {
                records.push(currentRecord.join('\n'));
              }
              currentRecord = [];
            }
          }

          if (currentRecord.length) {
            const sourceFileLine = currentRecord.find(recordLine => recordLine.startsWith('SF:'));
            const sourceFile = sourceFileLine ? sourceFileLine.slice(3).trim() : '';
            if (sourceFile) {
              records.push(currentRecord.join('\n'));
            }
          }

          fs.writeFileSync(coveragePath, `${records.join('\n')}\n`);
          NODE

      - name: Upload coverage artifact
        if: matrix.coverage
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.coverage-artifact }}
          path: coverage/lcov.info
          if-no-files-found: error

  upload-coverage:
    name: Upload coverage
    needs: test
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          merge-multiple: false
          path: coverage-artifacts

      - name: Merge coverage reports
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const coverageFiles = [
            'coverage-artifacts/coverage-node/lcov.info',
            'coverage-artifacts/coverage-headless/lcov.info'
          ];

          const reports = new Map();
          for (const coverageFile of coverageFiles) {
            const records = fs.readFileSync(coverageFile, 'utf8').split('end_of_record');
            for (const recordText of records) {
              const lines = recordText.split(/\r?\n/).filter(Boolean);
              const sourceFileLine = lines.find(line => line.startsWith('SF:'));
              if (!sourceFileLine) {
                continue;
              }

              const sourceFile = sourceFileLine.slice(3);
              const report = reports.get(sourceFile) || {
                sourceFile,
                testName: '',
                functions: new Map(),
                functionData: new Map(),
                branches: new Map(),
                lines: new Map()
              };

              for (const line of lines) {
                if (line.startsWith('TN:') && !report.testName) {
                  report.testName = line.slice(3);
                } else if (line.startsWith('FN:')) {
                  const [, lineNumber, functionName] = line.match(/^FN:(\d+),(.+)$/) || [];
                  if (lineNumber && functionName) {
                    report.functions.set(functionName, Number(lineNumber));
                  }
                } else if (line.startsWith('FNDA:')) {
                  const [, hits, functionName] = line.match(/^FNDA:(\d+),(.+)$/) || [];
                  if (hits && functionName) {
                    report.functionData.set(
                      functionName,
                      (report.functionData.get(functionName) || 0) + Number(hits)
                    );
                  }
                } else if (line.startsWith('BRDA:')) {
                  const [, block, branch, branchIndex, hits] =
                    line.match(/^BRDA:(\d+),(\d+),(\d+),(.+)$/) || [];
                  if (block && branch && branchIndex && hits) {
                    const branchKey = `${block},${branch},${branchIndex}`;
                    const hitCount = hits === '-' ? 0 : Number(hits);
                    report.branches.set(branchKey, (report.branches.get(branchKey) || 0) + hitCount);
                  }
                } else if (line.startsWith('DA:')) {
                  const [, lineNumber, hits] = line.match(/^DA:(\d+),(\d+)$/) || [];
                  if (lineNumber && hits) {
                    report.lines.set(
                      Number(lineNumber),
                      (report.lines.get(Number(lineNumber)) || 0) + Number(hits)
                    );
                  }
                }
              }

              reports.set(sourceFile, report);
            }
          }

          const output = [];
          for (const report of [...reports.values()].sort((left, right) =>
            left.sourceFile.localeCompare(right.sourceFile)
          )) {
            output.push(`TN:${report.testName}`, `SF:${report.sourceFile}`);

            for (const [functionName, lineNumber] of [...report.functions.entries()].sort(
              (left, right) => left[1] - right[1] || left[0].localeCompare(right[0])
            )) {
              output.push(`FN:${lineNumber},${functionName}`);
            }
            for (const [functionName, hits] of [...report.functionData.entries()].sort(
              (left, right) => left[0].localeCompare(right[0])
            )) {
              output.push(`FNDA:${hits},${functionName}`);
            }
            output.push(
              `FNF:${report.functions.size}`,
              `FNH:${[...report.functionData.values()].filter(hits => hits > 0).length}`
            );

            for (const [branchKey, hits] of [...report.branches.entries()].sort((left, right) =>
              left[0].localeCompare(right[0], undefined, {numeric: true})
            )) {
              output.push(`BRDA:${branchKey},${hits}`);
            }
            output.push(
              `BRF:${report.branches.size}`,
              `BRH:${[...report.branches.values()].filter(hits => hits > 0).length}`
            );

            for (const [lineNumber, hits] of [...report.lines.entries()].sort(
              (left, right) => left[0] - right[0]
            )) {
              output.push(`DA:${lineNumber},${hits}`);
            }
            output.push(
              `LF:${report.lines.size}`,
              `LH:${[...report.lines.values()].filter(hits => hits > 0).length}`,
              'end_of_record'
            );
          }

          fs.mkdirSync('coverage', {recursive: true});
          fs.writeFileSync(path.join('coverage', 'lcov.info'), `${output.join('\n')}\n`);
          NODE

      - name: Upload combined coverage to Coveralls
        uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b # v2.3.6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: coverage/lcov.info
          format: lcov
          fail-on-error: false

  build:
    name: Build
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node (with Corepack)
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack / Yarn 4
        run: |
          corepack enable
          corepack prepare yarn@4.10.3 --activate
          yarn -v

      - name: Cache Yarn 4 artifacts
        id: yarn-cache
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .pnp.*
            .yarn/install-state.gz
          key: yarn-cache-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            yarn-cache-${{ runner.os }}-

      - name: Print versions
        run: |
          node -v
          yarn -v
          node -p "process.versions"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run Vitest async guardrails
        run: yarn run test-vitest-async-guardrails

      - name: Build
        run: yarn run build

      - name: Run lint
        run: yarn run lint

  website-build:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node (with Corepack)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Enable Corepack / Yarn 4
        run: |
          corepack enable
          corepack prepare yarn@4.10.3 --activate
          yarn -v

      - name: Cache website Yarn artifacts
        id: website-yarn-cache
        uses: actions/cache@v4
        with:
          path: |
            website/.yarn/cache
            website/.pnp.*
            website/.yarn/install-state.gz
          key: website-yarn-cache-${{ runner.os }}-${{ hashFiles('website/yarn.lock') }}
          restore-keys: |
            website-yarn-cache-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build website
        run: |
          cd website; yarn build
