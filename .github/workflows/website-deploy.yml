name: website-deploy

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - 4.4-release

concurrency:
  group: website-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.repository_owner == 'visgl'
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node (with Corepack)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack / Yarn 4
        run: |
          corepack enable
          corepack prepare yarn@4.10.3 --activate
          yarn -v

      - name: Cache website Yarn artifacts
        id: website-yarn-cache
        uses: actions/cache@v4
        with:
          path: |
            website/.yarn/cache
            website/.pnp.*
            website/.yarn/install-state.gz
          key: website-yarn-cache-${{ runner.os }}-${{ hashFiles('website/yarn.lock') }}
          restore-keys: |
            website-yarn-cache-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Deploy preview website
        if: github.ref_name == 'master'
        run: |
          cd website
          yarn deploy-preview

      - name: Deploy production website
        if: github.ref_name == '4.4-release'
        run: |
          cd website
          yarn deploy-prod
